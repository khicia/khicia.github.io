<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>

    <link rel="stylesheet" href="styles.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- NAVBAR -->
    <div id="navbar"></div>

    <!-- CONTACT SECTION -->
    <section class="contact-section">

        <div class="contact-container">
            <h1>Contact Me</h1>
            <p>Feel free to reach out for collaborations or just a friendly hello</p>

            <div class="contact-content">

                <!-- LEFT: CONTACT DETAILS -->
                <div class="contact-info">

                    <h2>Get in Touch</h2>

                    <div class="info-item">
                        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/github/github-original.svg">
                        <a href="https://github.com/AkhiciaMaeCTorreliza" target="_blank">github.com/Akhicia Mae C.
                            Torreliza</a>
                    </div>

                    <div class="info-item">
                        <img src="https://cdn-icons-png.flaticon.com/512/732/732200.png">
                        <a href="mailto:calangiakhicia@email.com">calangiakhicia@email.com</a>
                    </div>

                    <div class="info-item">
                        <img src="https://cdn-icons-png.flaticon.com/512/597/597177.png">
                        <a href="tel:+639123456789">+63 912 345 6789</a>
                    </div>

                    <div class="info-item">
                        <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png">
                        <a href="https://www.facebook.com/calangi.aki" target="_blank">facebook.com/calangi.aki</a>
                    </div>

                    <div class="info-item">
                        <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
                        <a href="https://www.instagram.com/seoba_" target="_blank">instagram.com/seoba_</a>
                    </div>

                    <div class="info-item">
                        <img src="https://cdn-icons-png.flaticon.com/512/174/174857.png">
                        <a href="https://www.linkedin.com/in/akhiciamaectorreliza"
                            target="_blank">linkedin.com/in/Akhicia Mae C. Torreliza</a>
                    </div>
                    </div>

                    <!-- RIGHT: FORM -->
                    <form class="contact-form">

                        <input type="text" placeholder="Your Name" required>
                        <input type="email" placeholder="Your Email" required>
                        <textarea rows="5" placeholder="Your Message" required></textarea>

                        <button type="submit">Send Message</button>

                    </form>

                </div>
            </div>

    </section>

    <!-- FOOTER -->
    <div id="footer"></div>

    <!-- LOAD NAVBAR + FOOTER -->
    <script>
        fetch('nav_and_footer.html')
            .then(response => response.text())
            .then(data => {
                const parser = new DOMParser();
                const doc = parser.parseFromString(data, 'text/html');
                document.getElementById('navbar').innerHTML = doc.querySelector('nav').outerHTML;
                document.getElementById('footer').innerHTML = doc.querySelector('footer').outerHTML;
            });
    </script>

</body>

</html>
